<div class="relative w-full min-h-screen overflow-hidden">
    <!-- Fondo con imagen -->
    <div class="absolute inset-0 bg-login bg-cover bg-no-repeat bg-center"></div>

    <!-- Overlay oscuro -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Contenido encima -->
    <div class="relative z-10 flex flex-col justify-center items-center w-full h-full min-h-screen p-4 sm:p-6 md:p-8">
        <div class="w-full max-w-md md:max-w-2xl lg:max-w-4xl p-3 rounded-2xl md:rounded-3xl bg-white shadow-lg">
            <div class="flex flex-col md:flex-row md:min-h-[400px]">
                <div class="w-full md:w-1/2 p-6 space-y-5 order-2 md:order-1">
                    <!-- Logo visible solo en móvil -->
                    <div class="flex justify-center md:hidden mb-4">
                        <img [src]="logo" class="w-52 sm:w-40" alt="Logo">
                    </div>

                    <div class="text-center md:text-left">
                        <h3 class="text-2xl sm:text-3xl font-bold">Bienvenido de nuevo</h3>
                        <p class="font-normal text-sm sm:text-base">Ingresa tus credenciales</p>
                    </div>

                    <form
                        [formGroup]="loginForm"
                        class="space-y-3"
                        (keydown.enter)="onLogin()"
                    >
                        <div>
                            <label>Correo electrónico</label>
                            <input
                                type="text"
                                pInputText
                                formControlName="email"
                            />
                        </div>
                        <div>
                            <label>Contraseña</label>
                            <p-password
                                [feedback]="false"
                                [toggleMask]="true"
                                formControlName="password"
                            />
                        </div>
                        <p-button
                            label="Iniciar sesión"
                            size="small"
                            icon="pi pi-sign-in"
                            class="p-login-button"
                            (click)="onLogin()"
                            [loading]="isLoading"
                        />
                    </form>
                </div>

                <!-- Panel lateral con logo (oculto en móvil) -->
                <div class="hidden md:block md:w-1/2 relative rounded-2xl overflow-hidden order-1 md:order-2">
                    <!-- Fondo con imagen -->
                    <div class="absolute inset-0 bg-zinc-200 bg-cover bg-no-repeat bg-center"></div>

                    <!-- Contenido encima -->
                    <div class="relative z-10 flex flex-col justify-center items-center w-full h-full min-h-[200px]">
                        <img [src]="logo" class="mx-auto w-1/2 lg:w-96" alt="Logo">
                        @if (projectName) {
                            <span class="text-center text-primary text-lg">{{ projectName }}</span>
                            <span class="text-center text-secondary">Administradores</span>
                        }
                    </div>
                </div>
            </div>
        </div>

        <p class="text-white mt-3">
            &#64; {{ currentYear }} H. Ayuntamiento de Playa del Carmen
        </p>
    </div>
</div>
