<div class="space-y-6 md:space-y-8">
    <div class="space-y-4">
        <div class="flex items-center gap-2">
            <i class="pi pi-chart-pie"></i>
            <h3 class="text-lg sm:text-xl font-semibold">Reporte general por año/mes</h3>
        </div>


        <form [formGroup]="reportForm" class="flex flex-col sm:flex-row gap-4 sm:gap-5 sm:items-end">
            <div class="flex-1 sm:flex-none">
                <label>Selecciona el año</label>
                <p-select [options]="years" optionLabel="year" optionValue="year" formControlName="year" class="w-full" />
            </div>
            <div class="flex-1 sm:flex-none">
                <label>Selecciona el mes</label>
                <p-select [options]="months" optionLabel="month" optionValue="digit" formControlName="month" class="w-full" />
            </div>

            <div class="w-full sm:w-auto">
                <p-button
                    (click)="generateReport()"
                    label="Generar reporte"
                    icon="pi pi-download"
                    styleClass="w-full sm:w-auto"
                />
            </div>
        </form>
    </div>
    <div class="space-y-4">
        <div class="flex items-center gap-2">
            <i class="pi pi-chart-scatter"></i>
            <h3 class="text-lg sm:text-xl font-semibold">Reporte general por año/mes en ceros</h3>
        </div>


        <form [formGroup]="reportForm" class="flex flex-col sm:flex-row gap-4 sm:gap-5 sm:items-end">
            <div class="flex-1 sm:flex-none">
                <label>Selecciona el año</label>
                <p-select [options]="years" optionLabel="year" optionValue="year" formControlName="year" class="w-full" />
            </div>
            <div class="flex-1 sm:flex-none">
                <label>Selecciona el mes</label>
                <p-select [options]="months" optionLabel="month" optionValue="digit" formControlName="month" class="w-full" />
            </div>

            <div class="w-full sm:w-auto">
                <p-button
                    (click)="generateReport(1)"
                    label="Generar reporte"
                    icon="pi pi-download"
                    styleClass="w-full sm:w-auto"
                />
            </div>
        </form>
    </div>
</div>
